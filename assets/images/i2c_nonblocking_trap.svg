<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <pattern id="hatch" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="5" stroke="#6B7280" stroke-width="1" stroke-opacity="0.4"/>
  </pattern>
</defs>
<rect x="0" y="0" width="760" height="400" fill="white"/>
<line x1="90" y1="320" x2="750.0" y2="320" stroke="#6B7280" stroke-width="1" marker-end="url(#arr)"/>
<line x1="110.0" y1="316" x2="110.0" y2="324" stroke="#6B7280" stroke-width="1"/>
<line x1="110.0" y1="52" x2="110.0" y2="316" stroke="#D0D7E3" stroke-width="1" stroke-dasharray="3 4"/>
<text x="110.0" y="338" text-anchor="middle" fill="#6B7280" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" >0 µs</text>
<line x1="265.0" y1="316" x2="265.0" y2="324" stroke="#6B7280" stroke-width="1"/>
<line x1="265.0" y1="52" x2="265.0" y2="316" stroke="#D0D7E3" stroke-width="1" stroke-dasharray="3 4"/>
<text x="265.0" y="338" text-anchor="middle" fill="#6B7280" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" >100 µs</text>
<line x1="544.0" y1="316" x2="544.0" y2="324" stroke="#6B7280" stroke-width="1"/>
<line x1="544.0" y1="52" x2="544.0" y2="316" stroke="#D0D7E3" stroke-width="1" stroke-dasharray="3 4"/>
<text x="544.0" y="338" text-anchor="middle" fill="#6B7280" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" >280 µs</text>
<text x="756.0" y="324" text-anchor="start" fill="#6B7280" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" >t</text>
<text x="90" y="68" text-anchor="start" fill="#D64550" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" >Original driver: blind __delay_us(100)</text>
<text x="82" y="103.0" text-anchor="end" fill="#6B7280" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" >bus</text>
<rect x="110.0" y="84" width="434.0" height="30" fill="#378ADD" fill-opacity="0.18" stroke="#378ADD" stroke-width="1.2"/>
<text x="327.0" y="103.0" text-anchor="middle" fill="#1A3A6B" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" >transfer #1 (2 bytes ≈ 280 µs)</text>
<line x1="265.0" y1="50" x2="265.0" y2="80" stroke="#D64550" stroke-width="1.6" marker-end="url(#arr)"/>
<text x="271.0" y="46" text-anchor="start" fill="#D64550" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" >I2C1_Write #2 fired at t = 100 µs</text>
<line x1="258.0" y1="92.0" x2="272.0" y2="106.0" stroke="#D64550" stroke-width="2.4"/>
<line x1="258.0" y1="106.0" x2="272.0" y2="92.0" stroke="#D64550" stroke-width="2.4"/>
<text x="265.0" y="132" text-anchor="middle" fill="#D64550" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" >bus busy → returns false → byte silently dropped</text>
<text x="90" y="210" text-anchor="start" fill="#3FA96F" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" >Fixed: wait on I2C1_IsBusy()</text>
<text x="82" y="245.0" text-anchor="end" fill="#6B7280" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" >bus</text>
<rect x="110.0" y="226" width="434.0" height="30" fill="#378ADD" fill-opacity="0.18" stroke="#378ADD" stroke-width="1.2"/>
<text x="327.0" y="245.0" text-anchor="middle" fill="#1A3A6B" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" >transfer #1 (≈280 µs)</text>
<rect x="544.0" y="226" width="186.0" height="30" fill="#3FA96F" fill-opacity="0.22" stroke="#3FA96F" stroke-width="1.2"/>
<text x="637.0" y="245.0" text-anchor="middle" fill="#3FA96F" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" >transfer #2 ✓</text>
<rect x="110.0" y="264" width="434.0" height="12" fill="url(#hatch)" stroke="#6B7280" stroke-width="0.8"/>
<text x="327.0" y="292" text-anchor="middle" fill="#6B7280" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" >CPU: while (I2C1_IsBusy()) { } — waits exactly until the transfer ends</text>
<text x="380.0" y="380" text-anchor="middle" fill="#6B7280" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" font-style="italic">A blind 100 µs delay is shorter than the 280 µs transfer — wait on the hardware, not on a guess.</text>
</svg>