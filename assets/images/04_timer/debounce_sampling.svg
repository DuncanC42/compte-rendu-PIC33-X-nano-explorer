<text x="360.0" y="450" text-anchor="middle" fill="#1F2937" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" >Result: 1 physical press = exactly 1 toggle, no matter how the contact bounces.</text>
