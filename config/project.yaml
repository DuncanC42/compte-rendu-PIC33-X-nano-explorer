# --- Identité du document ---
title: "Rapport d'étude des processus de communication sur un PIC33"
subtitle: "Mise en place de différents processus de communication via des projets entre le PIC33 et le Nano explorer"
author: "Cadoret Duncan"
author_email: "d25cadore@enib.fr"
author_role: "Étudiant à l'École Nationale d'Ingénieurs de Brest / Stage international"
date: "Juin 2026"
version: "1.0"
doc_type: "report"
# doc_type options : report | proposal | spec | brief | readme

# --- Destinataire ---
recipient_name: "Prénom Nom"
recipient_company: "Entreprise Destinataire"
recipient_role: "Poste du destinataire"

# --- Expéditeur / Marque ---
sender_company: "Votre Entreprise"
sender_website: "https://votresite.com"
logo: "./assets/images/UMC-EN.png"

# --- Langue & Localisation ---
lang: "fr-FR"
# Options ISO 639 : fr-FR | en-US | en-GB | de-DE | es-ES

# =============================================================
#  THEME — Couleurs & Typographie
#  Modifier ici pour changer l'identité visuelle complète.
# =============================================================

theme:
  primary:    "#1A3A6B"   # Bleu UMC — titres, liens, barre de couverture
  secondary:  "#1E2D5A"   # Bleu marine ENIB — sous-titres, labels
  accent:     "#E8607A"   # Rose ENIB — highlights, badges, puces importantes
  text:       "#1F2937"
  text_muted: "#6B7280"
  bg:         "#FFFFFF"
  bg_alt:     "#F0F4FA"   # Légère teinte bleu UMC sur les blocs
  border:     "#D0D7E3"
  code_bg:    "#1E2D5A"   # Bleu ENIB pour les blocs code
  code_text:  "#F9FAFB"

  # Typographie
  font_body:    "'Inter', 'Helvetica Neue', Arial, sans-serif"
  font_heading: "'Inter', 'Helvetica Neue', Arial, sans-serif"
  font_mono:    "'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
  font_size:    "16px"
  line_height:  "1.75"

  # Mise en page
  max_width:    "860px"
  border_radius: "6px"

# =============================================================
#  OPTIONS DE RENDU
# =============================================================
layout:
  toc: true             # Afficher la table des matières
  toc_depth: 3          # Profondeur de la TOC (1-6)
  numbered_sections: false
  cover_page: true      # Afficher une page de couverture
  header: true          # Afficher le header sur chaque section
  footer: true          # Afficher le footer
  papersize: "a4"       # a4 | letter | a3
  margin: "2.5cm"

# =============================================================
#  CONTENU DES PARTIALS
#  Variables injectées dans _header.md et _footer.md
# =============================================================
header:
  show_logo: true
  show_title: true
  show_nav: false       # Navigation (utile pour HTML multi-page)

footer:
  show_author: true
  show_date: true
  show_page_number: true
  custom_text: ""       # Texte personnalisé dans le footer (optionnel)
